apiVersion: v1
kind: Service
metadata:
  name: {{ include "oficina.fullname" . }}-server
  labels:
    {{- include "oficina.serverLabels" . | nindent 4 }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "oficina.serverSelectorLabels" . | nindent 4 }}
